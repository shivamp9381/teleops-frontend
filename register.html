<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeleOps AI — Register</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-box" style="max-width:480px">
    <div class="login-logo">
      <h1>TeleOps <span class="dot">AI</span></h1>
      <p>Create your NOC account</p>
    </div>

    <div id="alert-area"></div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-control"
               placeholder="John Engineer" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control"
               placeholder="engineer@teleops.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control"
               placeholder="Minimum 8 characters" required minlength="8">
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select id="role" class="form-select" required>
          <option value="">— Select Role —</option>
          <option value="NOC_ENGINEER">NOC Engineer</option>
          <option value="NOC_MANAGER">NOC Manager</option>
          <option value="READ_ONLY">Read Only</option>
          <option value="SUPER_ADMIN">Super Admin</option>
        </select>
      </div>
      <button type="submit" id="regBtn" class="btn btn-primary btn-block btn-lg">
        Create Account
      </button>
    </form>

    <div class="login-divider">— or —</div>
    <a href="index.html" class="btn btn-ghost btn-block">
      Back to Login
    </a>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('regBtn');
    const alertArea = document.getElementById('alert-area');
    alertArea.innerHTML = '';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account…';

    try {
      const data = await API.register({
        name:     document.getElementById('name').value,
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
        role:     document.getElementById('role').value
      });
      Auth.setSession(data);
      window.location.href = 'dashboard.html';
    } catch (err) {
      alertArea.innerHTML = `<div class="alert alert-danger">⚠️ ${err.message}</div>`;
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  });
</script>
</body>
</html>
